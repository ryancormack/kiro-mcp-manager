name: CI

on:
  pull_request:
    branches:
      - '**'

env:
  APP_NAME: KiroMcpManager
  SCHEME: KiroMcpManager
  PROJECT_PATH: KiroMcpManager/KiroMcpManager.xcodeproj

jobs:
  test:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.1.app

      - name: Run tests
        run: |
          xcodebuild test -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -destination 'platform=macOS' \
            -quiet
