      - name: Create release zip
        run: |
          cd artifacts
          zip -r "../$APP_NAME-${{ steps.version.outputs.version }}.zip" "$APP_NAME.app"
          cd ..
          shasum -a 256 "$APP_NAME-${{ steps.version.outputs.version }}.zip" > "$APP_NAME-${{ steps.version.outputs.version }}.zip.sha256"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.APP_NAME }}-${{ steps.version.outputs.version }}.zip
            ${{ env.APP_NAME }}-${{ steps.version.outputs.version }}.zip.sha256
